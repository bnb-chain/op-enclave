name: Security Scan

on:
  workflow_dispatch:
  schedule:
    # Run security scans weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Trivy vulnerability scanner for filesystem and dependencies
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Trivy vulnerability scanner on filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          
      - name: Run Trivy vulnerability scanner on dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-deps-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret,config'
          
      - name: Upload Trivy filesystem scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          
      - name: Upload Trivy dependencies scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-deps-results.sarif'

  # CodeQL analysis for source code vulnerabilities
  codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'python', 'go']
        
    steps:
      - uses: actions/checkout@v3
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}
          
      - name: Autobuild
        uses: github/codeql-action/autobuild@v2
        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  # Dependency vulnerability scanning
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Scan npm dependencies if package.json exists
      - name: Scan npm dependencies
        if: hashFiles('**/package.json') != ''
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          
      # Scan Python dependencies if requirements.txt exists
      - name: Scan Python dependencies
        if: hashFiles('**/requirements.txt') != ''
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          
      # Scan Go dependencies if go.mod exists
      - name: Scan Go dependencies
        if: hashFiles('**/go.mod') != ''
        uses: snyk/actions/golang@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # Container image vulnerability scanning
  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Build Docker images for scanning
        run: |
          # Build images without pushing for scanning
          docker build -t op-enclave:scan ./op-enclave
          docker build -t op-batcher:scan ./op-batcher
          docker build -t op-proposer:scan ./op-proposer
          
      - name: Scan op-enclave image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'op-enclave:scan'
          format: 'sarif'
          output: 'trivy-op-enclave.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          
      - name: Scan op-batcher image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'op-batcher:scan'
          format: 'sarif'
          output: 'trivy-op-batcher.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          
      - name: Scan op-proposer image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'op-proposer:scan'
          format: 'sarif'
          output: 'trivy-op-proposer.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          
      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: |
            trivy-op-enclave.sarif
            trivy-op-batcher.sarif
            trivy-op-proposer.sarif

  # Security summary and reporting
  security-report:
    runs-on: ubuntu-latest
    needs: [trivy-scan, codeql-analysis, dependency-scan, container-scan]
    if: always()
    steps:
      - name: Security Scan Summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "Security scans completed for:" >> $GITHUB_STEP_SUMMARY
          echo "- Filesystem vulnerabilities (Trivy)" >> $GITHUB_STEP_SUMMARY
          echo "- Source code vulnerabilities (CodeQL)" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency vulnerabilities (Snyk)" >> $GITHUB_STEP_SUMMARY
          echo "- Container vulnerabilities (Trivy)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the Security tab for detailed results." >> $GITHUB_STEP_SUMMARY 